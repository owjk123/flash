name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p /opt/android-sdk/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest 2>/dev/null || true
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "/opt/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/opt/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "/opt/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
        
      - name: Clear TypeScript build cache
        run: |
          rm -rf node_modules/.tmp
          rm -f tsconfig.app.tsbuildinfo tsconfig.node.tsbuildinfo tsconfig.tsbuildinfo 2>/dev/null || true
          find . -name "*.tsbuildinfo" -delete 2>/dev/null || true
          echo "Cache cleared"
        
      - name: Build web app
        run: npm run build 2>&1
        
      - name: Sync Capacitor
        run: npx cap sync android
        
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -15
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: FlashPlayer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
